name: CI

# Continuous integration for the MCU bypass firmware.
#
# The goal of this workflow is reproducibility: it proves that the full
# build + verification suite passes on a clean machine, not just on the
# developer's box. The runner is pinned to ubuntu-24.04 so the installed
# toolchain matches TOOLCHAIN.adoc (avr-gcc 7.3, gcc 13, clang/clang-tidy 18,
# cppcheck 2.13, simavr 1.6) as closely as the distro packages allow.
#
# Most of the matrix lives inside the Makefile: a single `make test` already
# exercises all three variants (cd4053, mute, relay) across the ATtiny13a and
# the tinyx5 family, plus every analysis gate (clang-tidy, cppcheck,
# clang-analyzer, MISRA-C:2012) and the golden-model coverage gate. The jobs
# below wrap that, surface the per-MCU build matrix as discrete checks, and run
# the slower exhaustive/mutation suite off the PR hot path.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly exhaustive run (Mondays 06:00 UTC) so the long suite is exercised
    # even when there are no pushes.
    - cron: '0 6 * * 1'

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  # -------------------------------------------------------------------------
  # Gating job: the full fast suite. This is the "build passing" badge.
  # `make test` = analyze (clang-tidy + cppcheck + clang-analyzer + MISRA)
  #             + host/model-check/symbolic/fuse tests
  #             + CBMC SAT/SMT proof of the real bypass_pure.c core
  #             + simavr functional + fault-injection across all variants,
  #               ATtiny13a and tinyx5
  #             + golden-model coverage gate.
  # -------------------------------------------------------------------------
  verify:
    name: verify (make test)
    runs-on: ubuntu-24.04
    # Gate the AVR suite behind the fast PIC job: a PIC failure short-circuits
    # the run -- the slow AVR jobs are skipped instead of running in parallel.
    needs: pic
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make gcc-avr avr-libc \
            simavr libsimavr-dev libelf-dev \
            clang clang-tidy cppcheck cbmc

      - name: Record toolchain versions
        run: |
          echo "== avr-gcc =="     && avr-gcc --version | head -1
          echo "== gcc =="         && gcc --version | head -1
          echo "== clang =="       && clang --version | head -1
          echo "== clang-tidy ==" && clang-tidy --version | head -2 | tail -1
          echo "== cppcheck =="    && cppcheck --version
          echo "== cbmc =="        && cbmc --version
          echo "== simavr =="      && (simavr --version 2>&1 | head -1 || true)
          echo "== python3 =="     && python3 --version

      - name: Full verification suite
        # STRICT_TOOLS=1: this runner installs the whole toolchain, so any
        # optional gate that would otherwise skip cleanly (cppcheck, cbmc, the
        # MISRA python addon, ...) must actually RUN -- a silent skip here would
        # mean a broken install masquerading as a green build.
        run: make test STRICT_TOOLS=1

  # -------------------------------------------------------------------------
  # PIC10F322 gate: the PIC counterpart of `verify`. Mirrors `make pic-test` --
  # builds every variant with XC8 + enforces the 512-word flash budget, verifies
  # the emitted CONFIG word vs design intent, runs cppcheck+MISRA on the PIC
  # shell, and drives the footswitch through gpsim asserting PORTA/LATA -- then
  # runs the fail-closed real-HEX target aggregate (`make pic-test-target-variants`):
  # libgpsim fault recovery, firmware/model ctx_ lock-step, and GPIO transition /
  # pulse timing for every PIC variant.
  #
  # XC8 and the PIC10-12Fxxx DFP are not in apt; they are fetched from Microchip
  # (the free tier needs no key to compile) and installed to the paths the
  # Makefile defaults to (also passed explicitly via PIC_CC / PIC_DFP). gpsim,
  # gpsim-dev + libglib2.0-dev + g++ (the libgpsim fault-inject build), cppcheck,
  # python3 come from apt.
  #
  # CRITICAL: the `make pic-test` sub-targets SKIP CLEANLY when a tool/header is
  # absent -- fatal for a gate (a failed XC8 fetch would make every check "skip"
  # and the job go green on nothing). The "Assert PIC toolchain present" step
  # fails loud so a broken install can never masquerade as a pass; the cache is
  # only SAVED after that assert, so a half-baked install is never cached.
  #
  # NOTE: confirm the XC8 download URL and the unattended-installer flags
  # against microchip.com / `./xc8.run --help` (both change per release). The
  # DFP packs.download.microchip.com/<pack>.atpack URL scheme is stable.
  pic:
    name: pic (make pic-test)
    runs-on: ubuntu-24.04
    env:
      # Pin to the versions in TOOLCHAIN.adoc; bump compiler + DFP together.
      XC8_VERSION: "3.10"
      DFP_VERSION: "1.9.189"
      XC8_DIR: /opt/microchip/xc8/v3.10
      # .atpack unzips here so PIC_DFP = $XC8_DFP_ROOT/xc8 (its xc8/ subtree).
      XC8_DFP_ROOT: /opt/microchip/mdfp/PIC10-12Fxxx_DFP/1.9.189
    steps:
      - uses: actions/checkout@v4

      - name: Install gpsim + analyzers (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc g++ gpsim gpsim-dev libglib2.0-dev \
            pkg-config cppcheck python3 unzip wget

      - name: Restore cached XC8 + DFP
        id: cache-xc8
        uses: actions/cache/restore@v4
        with:
          path: /opt/microchip
          key: microchip-xc8-${{ env.XC8_VERSION }}-dfp-${{ env.DFP_VERSION }}

      - name: Install XC8 (free tier) + PIC10-12Fxxx DFP
        if: steps.cache-xc8.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          # --- XC8 compiler ---
          xc8_run="xc8-v${XC8_VERSION}-full-install-linux-x64-installer.run"
          xc8_base="https://ww1.microchip.com/downloads/aemDocuments/documents"
          xc8_base="${xc8_base}/DEV/ProductDocuments/SoftwareTools"
          wget -q "${xc8_base}/${xc8_run}" -O /tmp/xc8.run
          chmod +x /tmp/xc8.run
          sudo /tmp/xc8.run --mode unattended --unattendedmodeui none \
            --netservername '' --LicenseType FreeMode --prefix "${XC8_DIR}"
          # --- PIC10-12Fxxx Device Family Pack (.atpack == a zip) ---
          sudo mkdir -p "${XC8_DFP_ROOT}"
          dfp_pack="Microchip.PIC10-12Fxxx_DFP.${DFP_VERSION}.atpack"
          wget -q "https://packs.download.microchip.com/${dfp_pack}" \
            -O /tmp/dfp.atpack
          sudo unzip -q -o /tmp/dfp.atpack -d "${XC8_DFP_ROOT}"

      - name: Assert PIC toolchain present (fail loud, do NOT skip)
        run: |
          xc8="${XC8_DIR}/bin/xc8-cc"
          dev="${XC8_DFP_ROOT}/xc8/pic/include/proc/pic10f322.h"
          test -x "${xc8}" || { echo "::error::XC8 missing: ${xc8}"; exit 1; }
          test -f "${dev}" || { echo "::error::DFP missing: ${dev}"; exit 1; }
          for t in gpsim cppcheck c++; do
            command -v "$t" >/dev/null || { echo "::error::no $t"; exit 1; }
          done
          # the libgpsim target aggregate needs the gpsim headers + glib
          test -f /usr/include/gpsim/sim_context.h \
            || { echo "::error::gpsim-dev headers missing"; exit 1; }
          pkg-config --exists glib-2.0 \
            || { echo "::error::libglib2.0-dev missing"; exit 1; }

      # Save only after the assert passed, so a partial install is never cached.
      - name: Save XC8 + DFP cache
        if: steps.cache-xc8.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /opt/microchip
          key: microchip-xc8-${{ env.XC8_VERSION }}-dfp-${{ env.DFP_VERSION }}

      - name: Record toolchain versions
        run: |
          echo "xc8-cc:" && "${XC8_DIR}/bin/xc8-cc" --version | head -2 || true
          echo "gpsim:"  && (gpsim --version 2>&1 | head -1 || true)
          echo "cppcheck:" && cppcheck --version

      - name: PIC pre-hardware gate
        # STRICT_TOOLS=1: the assert step above proved XC8/DFP/gpsim are present,
        # so the pic-test sub-gates must run, not skip. (Consistent with that assert.)
        run: |
          make pic-test STRICT_TOOLS=1 \
            PIC_CC="${XC8_DIR}/bin/xc8-cc" \
            PIC_DFP="${XC8_DFP_ROOT}/xc8"

      # Fail-closed target aggregate (libgpsim), every variant. The aggregate
      # itself requires explicit PASS sentinels from fault, lock-step, and I/O;
      # a silent skip or partial run is therefore a failure.
      - name: PIC target aggregate (make pic-test-target-variants)
        run: |
          make pic-test-target-variants STRICT_TOOLS=1 \
            PIC_CC="${XC8_DIR}/bin/xc8-cc" \
            PIC_DFP="${XC8_DFP_ROOT}/xc8"

      # The mutation driver also runs its core AVR mutants. Keep their extra
      # toolchain and the minutes-long gate off the pull-request hot path.
      - name: Install AVR mutation dependencies (apt)
        if: >-
          github.event_name == 'push' ||
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch'
        run: |
          sudo apt-get install -y \
            gcc-avr avr-libc simavr libsimavr-dev libelf-dev

      - name: Fail-closed mutation gate (make test-mutation)
        if: >-
          github.event_name == 'push' ||
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch'
        run: |
          make test-mutation STRICT_TOOLS=1 MUTATION_ALLOW_SKIP=0 \
            PIC_CC="${XC8_DIR}/bin/xc8-cc" \
            PIC_DFP="${XC8_DFP_ROOT}/xc8"

      - name: Upload PIC firmware images
        uses: actions/upload-artifact@v4
        with:
          name: firmware-pic10f322
          path: build_pic/*.hex
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Development-only ATtiny202 (AVR-XT) gate: the AVR-XT counterpart of the
  # `pic` job. It is the ONLY place the ATtiny202 is built in CI (build-matrix
  # covers the release-supported classic parts), so it doubles as the 202 build
  # + 2 KB flash-budget gate, then runs the yasimavr dynamic harness --
  # functional + physical output timing (attiny202-sim), fault injection
  # (attiny202-fault), and a short soak smoke (attiny202-soak). This lane is not
  # release qualification.
  #
  # Two out-of-apt inputs, both fetched + version-pinned by repo scripts and
  # cached: the ATtiny_DFP device files (scripts/fetch_attiny_dfp.sh -- a static
  # atpack, no account/EULA) needed to COMPILE the image, and a PATCHED yasimavr
  # (scripts/fetch_yasimavr.sh -- pinned sdist + the two vendored bug-fix patches,
  # compiled into a project-local venv) needed to RUN it. The rest (avr-gcc,
  # python3-dev, g++) is apt.
  #
  # CRITICAL (same hazard as the pic job): the attiny202-* targets SKIP CLEANLY
  # when the DFP or the venv is absent -- fatal for a gate. The two "Assert ...
  # present" steps fail loud so a broken fetch can never make the gates go green
  # on nothing, and each run step greps for the expected number of PASS lines as
  # belt-and-suspenders against a partial (per-variant) skip.
  attiny202:
    name: attiny202 development (yasimavr sim/fault/soak)
    runs-on: ubuntu-24.04
    needs: pic   # gate behind the fast PIC job (see `verify`)
    env:
      # Bump with scripts/fetch_attiny_dfp.sh's pinned VER (keeps the cache key
      # in step). The venv cache keys on the patch set + fetch script instead.
      ATTINY_DFP_VER: "3.1.260"
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (apt)
        run: |
          sudo apt-get update
          # avr-gcc/avr-libc + binutils-avr (avr-nm, used by the fault harness to
          # resolve ctx_) build+inspect the image; python3-dev + g++ compile
          # yasimavr's C++/SIP extension; python3-venv provides ensurepip;
          # libelf-dev supplies libelf.h, which yasimavr's sim_firmware.cpp
          # needs to load the ELF image.
          sudo apt-get install -y \
            make gcc-avr avr-libc binutils-avr \
            python3 python3-venv python3-dev g++ \
            libelf-dev \
            curl unzip patch

      - name: Restore cached ATtiny_DFP
        id: cache-dfp
        uses: actions/cache/restore@v4
        with:
          path: third_party/attiny_dfp
          key: attiny-dfp-${{ env.ATTINY_DFP_VER }}

      - name: Fetch ATtiny_DFP device files
        run: scripts/fetch_attiny_dfp.sh

      - name: Build ATtiny202 firmware (+ 2 KB flash-budget gate)
        run: make attiny202

      - name: Assert ATtiny202 images built (fail loud, do NOT skip)
        run: |
          for v in $(make -s print-VARIANTS); do
            hex="build_avr_xt/bypass_${v}_attiny202.hex"
            test -f "$hex" || { echo "::error::missing $hex (DFP fetch or build failed)"; exit 1; }
          done

      - name: Save ATtiny_DFP cache
        if: steps.cache-dfp.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: third_party/attiny_dfp
          key: attiny-dfp-${{ env.ATTINY_DFP_VER }}

      - name: Restore cached patched yasimavr venv
        id: cache-yasimavr
        uses: actions/cache/restore@v4
        with:
          path: third_party/yasimavr/venv
          # Rebuild when the pinned release, the patches, or the build script
          # change. fetch_yasimavr.sh re-verifies the venv on a hit and rebuilds
          # it if the interpreter/import is broken, so a stale cache self-heals.
          key: yasimavr-venv-${{ hashFiles('scripts/fetch_yasimavr.sh', 'third_party/yasimavr/patches/**') }}

      - name: Build patched yasimavr (pinned sdist + vendored patches)
        run: scripts/fetch_yasimavr.sh

      - name: Assert patched yasimavr present (fail loud, do NOT skip)
        run: |
          py=third_party/yasimavr/venv/bin/python
          test -x "$py" || { echo "::error::yasimavr venv missing ($py)"; exit 1; }
          "$py" - <<'PY' || { echo "::error::yasimavr import / WDT model broken"; exit 1; }
          from yasimavr.device_library import load_device
          assert load_device('attiny202').find_peripheral('WDT') is not None
          PY

      - name: Save yasimavr venv cache
        if: steps.cache-yasimavr.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: third_party/yasimavr/venv
          key: yasimavr-venv-${{ hashFiles('scripts/fetch_yasimavr.sh', 'third_party/yasimavr/patches/**') }}

      - name: Record versions
        run: |
          echo "== avr-gcc ==" && avr-gcc --version | head -1
          echo "== python3 ==" && python3 --version
          echo "== yasimavr ==" && third_party/yasimavr/venv/bin/python -c \
            "import yasimavr; print(getattr(yasimavr,'__version__','(patched 0.1.6)'))"

      # Each gate greps for one PASS line per variant, so a per-variant skip
      # (e.g. a missing image) fails the step even though make returned 0.
      - name: Functional + target-output gate (make attiny202-sim)
        run: |
          set -o pipefail
          n=$(make -s print-VARIANTS | wc -w)
          make attiny202-sim 2>&1 | tee sim.log
          p=$(grep -c "SIM PASS" sim.log || true)
          [ "$p" -eq "$n" ] || { echo "::error::attiny202-sim: $p/$n variants PASSed (skip or fail)"; exit 1; }

      - name: Fault-injection gate (make attiny202-fault)
        run: |
          set -o pipefail
          # Pin the complete development matrix independently of Make defaults;
          # each FAULT PASS also requires 11/11 injections, 12/12 results, no skips.
          n=3
          make attiny202-fault 2>&1 | tee fault.log
          p=$(grep -c "FAULT PASS" fault.log || true)
          [ "$p" -eq "$n" ] || { echo "::error::attiny202-fault: $p/$n variants PASSed (skip or fail)"; exit 1; }

      # Short soak smoke (5 min simulated ~= 2 s/variant) -- proves the soak
      # harness + liveness path work on every variant. Longer soaks remain an
      # optional local development run via XT_SOAK_DURATION_MS; they are not
      # part of release qualification.
      - name: Soak smoke (make attiny202-soak, 5 min simulated)
        run: |
          set -o pipefail
          n=$(make -s print-VARIANTS | wc -w)
          make attiny202-soak XT_SOAK_DURATION_MS=300000 \
               XT_SOAK_PROGRESS_INTERVAL_MS=300000 2>&1 | tee soak.log
          p=$(grep -c "SOAK PASS" soak.log || true)
          [ "$p" -eq "$n" ] || { echo "::error::attiny202-soak: $p/$n variants PASSed (skip or fail)"; exit 1; }

      - name: Upload development-only ATtiny202 images
        uses: actions/upload-artifact@v4
        with:
          name: development-attiny202
          path: build_avr_xt/*.hex
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Visible build matrix: prove every variant builds for every release-supported
  # AVR Classic MCU and publish the firmware images + size reports. `make
  # all13/all45/all85` builds all variants for that part; the size<n> target
  # prints flash/RAM.
  # -------------------------------------------------------------------------
  build-matrix:
    name: build (${{ matrix.mcu }})
    runs-on: ubuntu-24.04
    needs: pic   # gate behind the fast PIC job (see `verify`)
    strategy:
      fail-fast: false
      matrix:
        include:
          - mcu: attiny13a
            build: all13
            size: size
          - mcu: attiny85
            build: all85
            size: size85
          - mcu: attiny45
            build: all45
            size: size45
    steps:
      - uses: actions/checkout@v4

      - name: Install AVR toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc-avr avr-libc

      - name: Build all variants for ${{ matrix.mcu }}
        run: make ${{ matrix.build }}

      - name: Resource utilization (flash / RAM)
        run: make ${{ matrix.size }} AVR_REBUILD_PREREQ= | tee size-${{ matrix.mcu }}.txt

      - name: Upload firmware images
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.mcu }}
          path: |
            build_avr_classic/*.hex
            size-${{ matrix.mcu }}.txt
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Exhaustive / mutation suite (minutes-long). Kept off every PR: runs on
  # pushes to main, the weekly schedule, and manual dispatch. `make test-long`
  # = the full suite with the exhaustive input domains plus mutation testing
  # (verifies the suite actually kills injected firmware faults).
  # -------------------------------------------------------------------------
  stress:
    name: stress (make test-long)
    runs-on: ubuntu-24.04
    needs: pic   # gate behind the fast PIC job (see `verify`)
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make gcc-avr avr-libc \
            simavr libsimavr-dev libelf-dev \
            clang clang-tidy cppcheck cbmc

      - name: Exhaustive + mutation suite
        run: make test-long
